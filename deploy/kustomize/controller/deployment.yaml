apiVersion: apps/v1
kind: Deployment
metadata:
  name: buckety-controller
  labels:
    app.kubernetes.io/name: buckety-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: buckety-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buckety-controller
    spec:
      serviceAccountName: buckety-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: controller
        image: ghcr.io/yolean/buckety-controller:dev
        imagePullPolicy: IfNotPresent
        args:
        - "-c"
        - "/etc/buckety"
        ports:
        - name: webhook
          containerPort: 9443
          protocol: TCP
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: healthz
          containerPort: 8081
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: healthz
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: healthz
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
        volumeMounts:
        - name: config
          mountPath: /etc/buckety
          readOnly: true
        - name: webhook-tls
          mountPath: /var/run/buckety/webhook-tls
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: config
        secret:
          secretName: buckety-controller-config
      - name: webhook-tls
        secret:
          secretName: buckety-controller-webhook-tls
          optional: true
      - name: tmp
        emptyDir: {}
