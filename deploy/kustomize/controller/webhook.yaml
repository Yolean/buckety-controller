apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: buckety-controller
  annotations:
    # cert-manager populates caBundle from the named Certificate's
    # auto-managed Secret. The base leaves caBundle empty so plain
    # `kustomize build` works. Convention: platforms create a
    # Certificate named "buckety-controller-webhook" in the
    # controller's namespace with secretName
    # "buckety-controller-webhook-tls". The Deployment mounts that
    # Secret at /var/run/buckety/webhook-tls.
    cert-manager.io/inject-ca-from: buckety/buckety-controller-webhook
webhooks:
- name: validate.buckety.yolean.se
  admissionReviewVersions: [v1]
  sideEffects: None
  failurePolicy: Fail
  timeoutSeconds: 10
  rules:
  - apiGroups: [buckety.yolean.se]
    apiVersions: [v1alpha1]
    operations: [CREATE, UPDATE]
    resources: [bucketies, bucketyaccesses]
  clientConfig:
    service:
      name: buckety-controller-webhook
      namespace: buckety
      path: /validate
      port: 443
