apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# CRDs only. Apply this base first (or alongside ../base/, which
# composes it) so the schema is in place before any custom
# resources are created. CRDs typically have a different
# lifecycle from the controller: they survive controller image
# upgrades, and a v1alpha1 -> v1alpha2 schema change is the only
# reason they should ever roll over.
resources:
- buckety.yaml
- bucketyaccess.yaml
