# Buckety controller e2e.
#
# Per SPEC.md §E2E harness #5, this workflow is a thin wrapper:
# it does not know about scenarios. If a scenario is added under
# examples/, this file does not change. Anything else that would
# normally go here lives in test/e2e/run.sh and is identical
# locally and in CI.
name: e2e

# push limited to main: PR branches otherwise run every commit
# twice (push + pull_request), and the two ~20min runs of the same
# sha can flake independently, which reads as a contradiction.
on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      digest: ${{ steps.release.outputs.digest }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod  # reproducibility: same Go as local builds

    - name: Vet and unit tests
      run: |
        set -euxo pipefail
        go vet ./...
        go test ./...

    - name: Install k3d, kubectl, crane, yq
      run: |
        set -euxo pipefail
        # k3d is the only provisioner that works in GHA; kind, minikube
        # and the bridged-NAT provisioners conflict with the runner's
        # network/userns posture.
        curl -sSL https://raw.githubusercontent.com/k3d-io/k3d/v5.8.3/install.sh \
          | TAG=v5.8.3 bash
        k3d version
        kubectl version --client=true
        # crane converts our OCI layout to a registry push without a
        # docker daemon round-trip.
        go install github.com/google/go-containerregistry/cmd/crane@v0.20.6
        # yq parses the pinned tag + digest out of the release kustomization.
        go install github.com/mikefarah/yq/v4@v4.46.1
        echo "$HOME/go/bin" >>"$GITHUB_PATH"
        "$HOME/go/bin/crane" version
        "$HOME/go/bin/yq" --version

    - name: Read pinned release
      id: release
      run: |
        set -euxo pipefail
        K=deploy/kustomize/release/kustomization.yaml
        T=$(yq '.images[] | select(.name == "ghcr.io/yolean/buckety-controller") | .newTag' "$K")
        D=$(yq '.images[] | select(.name == "ghcr.io/yolean/buckety-controller") | .digest' "$K")
        [[ -n "$T" && "$T" != null ]] || { echo "$K: no newTag" >&2; exit 1; }
        [[ "$D" == sha256:* ]] || { echo "$K: bad digest $D" >&2; exit 1; }
        echo "tag=$T"    >> "$GITHUB_OUTPUT"
        echo "digest=$D" >> "$GITHUB_OUTPUT"

    - name: Start k3d cluster with local registry
      run: |
        set -euxo pipefail
        k3d registry create buckety-registry --port 0.0.0.0:5000
        k3d cluster create buckety-e2e \
          --image rancher/k3s:v1.34.9-k3s1 \
          --registry-use k3d-buckety-registry:5000 \
          --k3s-arg "--disable=traefik@server:*" \
          --no-lb \
          --wait
        kubectl wait --for=condition=Ready node --all --timeout=120s
        kubectl get nodes

    - name: Deploy backing services (Redpanda, VersityGW, MinIO, fake-gcs-server)
      run: |
        set -euxo pipefail
        kubectl apply -k test/e2e/backing-services
        # rollout status (not wait --for=Ready) tolerates the pods not
        # existing yet at the moment we ask.
        kubectl -n redpanda rollout status statefulset/redpanda --timeout=300s
        kubectl -n blobs rollout status deploy/versitygw --timeout=180s
        kubectl -n blobs rollout status deploy/minio --timeout=180s
        kubectl -n blobs rollout status deploy/fake-gcs --timeout=180s

    - name: Set up contain
      uses: solsson/setup-contain@49cc4cce1498df8a59e88fff52c1a9b747f11f08 # v1

    - name: Build controller image (contain) with pinned tag
      env:
        T: ${{ steps.release.outputs.tag }}
      run: |
        set -euxo pipefail
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -trimpath \
          -buildvcs=false \
          -ldflags "-s -w -X main.version=${T}" \
          -o target/linux/amd64/buckety \
          ./cmd/buckety
        IMAGE="ghcr.io/yolean/buckety-controller:${T}" \
          contain build --output ./oci --push=false

    - name: Assert produced digest matches pinned
      env:
        PINNED: ${{ steps.release.outputs.digest }}
      run: |
        set -euxo pipefail
        BUILT=$(jq -r '.manifests[0].digest' oci/index.json)
        if [[ "$BUILT" != "$PINNED" ]]; then
          echo "Pinned digest in deploy/kustomize/release/kustomization.yaml" >&2
          echo "  ${PINNED}" >&2
          echo "does not match the digest produced by this build:" >&2
          echo "  ${BUILT}" >&2
          echo "Re-run scripts/bump-release.sh and commit the result." >&2
          exit 1
        fi

    # The driver-version scenario rotates the controller between a
    # base, a patch-bumped and a major-bumped driver build (SPEC.md
    # scenario #9, docs/SCAFFOLDING.md "Driver version stamping").
    # These images exist only for that rotation: built here with
    # per-driver -X flags and pushed straight to the run's local
    # registry. They are not digest-pinned or published.
    - name: Build and push driver-version rotation images
      run: |
        set -euxo pipefail
        for v in 0.1.1 1.0.0; do
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath \
            -buildvcs=false \
            -ldflags "-s -w -X main.version=dv-${v} \
              -X github.com/Yolean/buckety-controller/pkg/drivers/kadm.version=${v} \
              -X github.com/Yolean/buckety-controller/pkg/drivers/s3.version=${v} \
              -X github.com/Yolean/buckety-controller/pkg/drivers/gcs.version=${v}" \
            -o target/linux/amd64/buckety \
            ./cmd/buckety
          IMAGE="ghcr.io/yolean/buckety-controller:dv-${v}" \
            contain build --output "./oci-dv-${v}" --push=false
          crane push --insecure "./oci-dv-${v}" \
            "localhost:5000/yolean/buckety-controller:dv-${v}"
        done

    - name: Run e2e harness
      env:
        IMPLEMENTATIONS: redpanda,versitygw,minio,fakegcs
        OCI_DIR: ./oci
        # PUSH_AS reaches the k3d local registry via its host-published
        # port; CONTROLLER_IMAGE uses the same registry's in-cluster
        # hostname so node containerd can pull it.
        PUSH_AS: localhost:5000/yolean/buckety-controller:${{ steps.release.outputs.tag }}
        CONTROLLER_IMAGE: k3d-buckety-registry:5000/yolean/buckety-controller:${{ steps.release.outputs.tag }}
        E2E_VERSION_BASE: 0.1.0
        E2E_VERSION_PATCH: 0.1.1
        E2E_VERSION_MAJOR: 1.0.0
        E2E_IMAGE_BASE: k3d-buckety-registry:5000/yolean/buckety-controller:${{ steps.release.outputs.tag }}
        E2E_IMAGE_PATCH: k3d-buckety-registry:5000/yolean/buckety-controller:dv-0.1.1
        E2E_IMAGE_MAJOR: k3d-buckety-registry:5000/yolean/buckety-controller:dv-1.0.0
      run: ./test/e2e/run.sh

    - name: Surface controller logs on failure
      if: failure()
      run: |
        kubectl -n buckety describe deploy/buckety-controller || true
        kubectl -n buckety logs deploy/buckety-controller --tail=500 || true
        kubectl -n redpanda describe pod -l app=redpanda || true
        kubectl -n blobs describe pod -l app=versitygw || true
        kubectl -n blobs describe pod -l app=minio || true
        kubectl -n blobs describe pod -l app=fake-gcs || true

  # The image push job runs only on main-branch builds in the canonical
  # Yolean org with a successful e2e. It rebuilds (proves reproducibility),
  # asserts the same digest the e2e job verified, then crane pushes to
  # ghcr.io. No commit-back: the digest is pinned in the commit being
  # built. repository_owner gates YoleanAgents and forks from publishing.
  publish:
    if: >-
      github.ref == 'refs/heads/main'
      && github.event_name == 'push'
      && github.repository_owner == 'Yolean'
    needs: e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod  # reproducibility: same Go as local builds

    - name: Install crane
      run: |
        set -euxo pipefail
        go install github.com/google/go-containerregistry/cmd/crane@v0.20.6
        echo "$HOME/go/bin" >>"$GITHUB_PATH"

    - name: Set up contain
      uses: solsson/setup-contain@49cc4cce1498df8a59e88fff52c1a9b747f11f08 # v1

    - name: Rebuild controller image with pinned tag
      env:
        T: ${{ needs.e2e.outputs.tag }}
      run: |
        set -euxo pipefail
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -trimpath \
          -buildvcs=false \
          -ldflags "-s -w -X main.version=${T}" \
          -o target/linux/amd64/buckety \
          ./cmd/buckety
        IMAGE="ghcr.io/yolean/buckety-controller:${T}" \
          contain build --output ./oci --push=false

    - name: Assert publish-time digest matches the e2e-tested digest
      env:
        PINNED: ${{ needs.e2e.outputs.digest }}
      run: |
        set -euxo pipefail
        BUILT=$(jq -r '.manifests[0].digest' oci/index.json)
        if [[ "$BUILT" != "$PINNED" ]]; then
          echo "publish rebuild produced ${BUILT}, e2e verified ${PINNED}" >&2
          exit 1
        fi

    - name: Login to ghcr.io
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        echo "$GITHUB_TOKEN" | crane auth login ghcr.io \
          -u "${{ github.actor }}" --password-stdin

    - name: Push image to ghcr.io
      env:
        T: ${{ needs.e2e.outputs.tag }}
      run: |
        set -euxo pipefail
        crane push ./oci "ghcr.io/yolean/buckety-controller:${T}"
