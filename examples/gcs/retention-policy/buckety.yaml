apiVersion: buckety.yolean.se/v1alpha1
kind: Buckety
metadata:
  name: keep-me
spec:
  backend: gcs
  retentionPolicy: Retain
  defaultAccess:
    role: ReadWrite
    credentialsSecretName: keep-me-bucket
---
apiVersion: buckety.yolean.se/v1alpha1
kind: Buckety
metadata:
  name: drop-me
spec:
  backend: gcs
  retentionPolicy: Delete
  parameters:
    # Versioned so the recursive Delete also proves archived
    # generations do not wedge deletion.
    versioning: "true"
  defaultAccess:
    role: ReadWrite
    credentialsSecretName: drop-me-bucket
