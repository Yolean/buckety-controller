# yaml-language-server: $schema=https://raw.githubusercontent.com/Yolean/buckety-controller/main/schema/buckety-gcs.schema.json
# Collides with the pre-created EMPTY resource; AdoptEmpty (the
# default) adopts it silently.
apiVersion: buckety.yolean.se/v1alpha1
kind: Buckety
metadata:
  name: adopt-void
spec:
  backend: gcs
  retentionPolicy: Delete
  defaultAccess:
    role: ReadWrite
    credentialsSecretName: adopt-void-creds
