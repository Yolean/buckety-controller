# yaml-language-server: $schema=https://raw.githubusercontent.com/Yolean/buckety-controller/main/schema/buckety-s3.schema.json
apiVersion: buckety.yolean.se/v1alpha1
kind: Buckety
metadata:
  name: templated
  labels:
    yolean.se/generation: "003"
spec:
  backend: s3
  name: "${backend.zone}-${namespace}-${name}-v${label['yolean.se/generation']}"
  retentionPolicy: Delete
  defaultAccess:
    role: ReadWrite
    credentialsSecretName: templated-bucket
