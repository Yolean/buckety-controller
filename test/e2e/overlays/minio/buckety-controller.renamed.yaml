# yaml-language-server: $schema=https://raw.githubusercontent.com/Yolean/buckety-controller/main/pkg/config/schema/buckety-controller.schema.json
# Same connection details as buckety-controller.yaml but with the
# backend name changed from 's3' to 's3-renamed'. Used by the
# s3/backend-stickiness scenario to prove status.backend stickiness
# survives a config rename.
backends:

- name: s3-renamed
  driver: s3
  config:
    implementation: minio
    endpoint: http://minio.blobs.svc.cluster.local:9000
    region: us-east-1
    forcePathStyle: true
    accessKeyID:     ${MINIO_ROOT_USER}
    secretAccessKey: ${MINIO_ROOT_PASSWORD}
  defaults:
    zone: e2e

- name: r2-fake
  driver: s3
  config:
    implementation: r2
    endpoint: https://example.invalid
    region: auto
    accessKeyID: not-used
    secretAccessKey: not-used
