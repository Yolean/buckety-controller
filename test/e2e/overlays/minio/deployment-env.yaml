apiVersion: apps/v1
kind: Deployment
metadata:
  name: buckety-controller
spec:
  template:
    spec:
      containers:
      - name: controller
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-server
              key: root-user
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-server
              key: root-password
