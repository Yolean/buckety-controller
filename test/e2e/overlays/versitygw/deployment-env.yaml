apiVersion: apps/v1
kind: Deployment
metadata:
  name: buckety-controller
spec:
  template:
    spec:
      containers:
      - name: controller
        env:
        - name: VERSITYGW_ROOT_ACCESSKEY
          valueFrom:
            secretKeyRef:
              name: versitygw-server
              key: root-accesskey
        - name: VERSITYGW_ROOT_SECRETKEY
          valueFrom:
            secretKeyRef:
              name: versitygw-server
              key: root-secretkey
